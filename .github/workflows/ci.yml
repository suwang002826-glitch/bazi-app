name: CI Gate
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies (no external deps required)
        run: echo "No external dependencies needed, running tests directly"
      
      - name: Run unit tests + integration verification
        run: npm test
